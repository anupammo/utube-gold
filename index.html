<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline BG Player</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  <meta name="theme-color" content="#ff0033">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <h1>BG Player</h1>
      </div>
      <button id="installBtn" class="btn btn-secondary install-hidden">Install App</button>
    </header>

    <main class="content">
      <!-- Download Manager -->
      <section class="download-section">
        <div class="input-group">
          <input type="text" id="videoUrl" placeholder="Paste YouTube Link or Video ID" />
          <button id="downloadBtn" class="btn btn-primary">Download</button>
        </div>
        <p id="statusMsg" class="status-message"></p>
      </section>
        
      <!-- Active Player Deck -->
      <section class="player-section">
        <div class="player-card">
          <div id="playerThumb" class="player-thumb-large"></div>
          <div class="player-info">
            <h4 id="currentTrackTitle">No Track Playing</h4>
            <p id="currentTrackArtist">Select a downloaded track below</p>
          </div>
          
          <div class="playback-controls">
            <span id="currentTime">00:00</span>
            <input type="range" id="progressBar" min="0" max="100" value="0" />
            <span id="totalDuration">00:00</span>
          </div>

          <div class="control-buttons">
            <button id="playPauseBtn" class="btn btn-icon">▶</button>
          </div>
        </div>
      </section>

      <!-- Persistent Offline List -->
      <section class="history-section">
        <h3>Downloaded Tracks</h3>
        <div id="offlineList" class="history-list">
          <p class="empty-state">No downloaded tracks found.</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Native HTML5 Audio element for background play -->
  <audio id="audioPlayer" style="display:none;"></audio>

  <script src="./app.js"></script>
</body>
</html>
