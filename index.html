<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Player</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  <meta name="theme-color" content="#ff0033">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <h1>BG Player</h1>
      </div>
      <button id="installBtn" class="btn btn-secondary install-hidden">Install App</button>
    </header>

    <main class="content">
      <section class="player-section">
        <div class="input-group">
          <input type="text" id="videoUrl" placeholder="Paste YouTube Link or Video ID" />
          <button id="loadBtn" class="btn btn-primary">Play</button>
        </div>
        
        <div class="video-wrapper">
          <div id="player"></div>
        </div>
      </section>

      <section class="history-section">
        <h3>Recently Played</h3>
        <div id="historyList" class="history-list">
          <p class="empty-state">No played tracks yet.</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Loop-friendly silent audio fallback for system audio focus -->
  <audio id="silentAudio" loop style="display:none;">
    <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
  </audio>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="./app.js"></script>
</body>
</html>
