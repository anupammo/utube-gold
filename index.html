<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline BG Player</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  <meta name="theme-color" content="#ff0033">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <h1>BG Player</h1>
      </div>
      <button id="installBtn" class="btn btn-secondary install-hidden">Install App</button>
    </header>

    <main class="content">
      <section class="player-section">
        <!-- Local File Import -->
        <div class="input-group">
          <label for="fileInput" class="btn btn-primary" style="display: block; text-align: center; width: 100%;">
            Select Downloaded Audio
          </label>
          <input type="file" id="fileInput" accept="audio/*" style="display: none;" />
        </div>
        
        <!-- Native Audio player UI -->
        <div class="player-card">
          <div id="playerThumb" class="player-thumb-large"></div>
          <div class="player-info">
            <h4 id="currentTrackTitle">No File Selected</h4>
            <p id="currentTrackArtist">Tap button above to load audio</p>
          </div>
          
          <div class="playback-controls">
            <span id="currentTime">00:00</span>
            <input type="range" id="progressBar" min="0" max="100" value="0" />
            <span id="totalDuration">00:00</span>
          </div>

          <div class="control-buttons">
            <button id="playPauseBtn" class="btn btn-icon">▶</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Native HTML5 Audio element -->
  <audio id="audioPlayer" style="display:none;"></audio>

  <script src="./app.js"></script>
</body>
</html>
